<!-- 
  ADIM 1: https://console.firebase.google.com adresine gidin
  ADIM 2: "Proje Ekle" tıklayın, isim verin (örn: aile-butce)
  ADIM 3: Google Analytics'i kapatabilirsiniz, "Proje oluştur"
  ADIM 4: Sol menüden "Realtime Database" > "Veritabanı oluştur"
  ADIM 5: Konum seçin (europe-west1), "Test modunda başla" seçin
  ADIM 6: Proje ayarları (⚙️) > Genel > "Web uygulaması ekle" (</> ikonu)
  ADIM 7: İsim verin, "Firebase Hosting"i işaretlemeyin, "Uygulamayı kaydet"
  ADIM 8: Size verilen config değerlerini aşağıya yapıştırın
-->

<script type="module">
// ============================================================
// 🔥 BURAYA FIREBASE CONFIG'İNİZİ YAPIŞTIRIN
// ============================================================
// Firebase konsolundan aldığınız değerleri buraya koyun:

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBJ0NkI2nexQGwXEN0wYorNkQkFqTnkc6k",
  authDomain: "familybudget-823c9.firebaseapp.com",
  databaseURL: "https://familybudget-823c9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "familybudget-823c9",
  storageBucket: "familybudget-823c9.firebasestorage.app",
  messagingSenderId: "715932023457",
  appId: "1:715932023457:web:ae38e0c2c5bf9249570ee0"
};

// ============================================================
// Firebase'i config'siz de çalıştır (local mode)  
// ============================================================
const IS_FIREBASE = FIREBASE_CONFIG.apiKey !== "BURAYA-API-KEY";

let db = null;
let dbRef = null;

if (IS_FIREBASE) {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const { getDatabase, ref, onValue, set } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
  
  const app = initializeApp(FIREBASE_CONFIG);
  db = getDatabase(app);
  dbRef = ref(db, 'butce');
  
  // Realtime listener - eşin girdiği veri anında gelir
  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      window.APP_STATE.members = data.members || [];
      window.APP_STATE.cats = data.cats || window.APP_STATE.cats;
      window.APP_STATE.income = data.income || [];
      window.APP_STATE.expenses = data.expenses || [];
      window.APP_STATE.goals = data.goals || [];
      window.APP_STATE.recurring = data.recurring || [];
      window.APP_STATE.lastRecurring = data.lastRecurring || null;
      window.APP_STATE.setup = data.setup !== undefined ? data.setup : true;
      window.APP_STATE.year = data.year || 2025;
      window.renderApp();
    }
  });
  
  window.syncToFirebase = () => {
    const s = window.APP_STATE;
    set(dbRef, {
      members: s.members,
      cats: s.cats,
      income: s.income,
      expenses: s.expenses,
      goals: s.goals,
      recurring: s.recurring,
      lastRecurring: s.lastRecurring,
      setup: s.setup,
      year: s.year
    });
  };
  
  const syncEl = document.getElementById('sync-status');
  if (syncEl) { syncEl.textContent = '🟢 Bağlı'; syncEl.style.color = '#1D9E75'; }
} else {
  // Firebase yoksa localStorage kullan
  window.syncToFirebase = () => {
    const s = window.APP_STATE;
    localStorage.setItem('aile_butce_v5', JSON.stringify({
      members: s.members, cats: s.cats, income: s.income,
      expenses: s.expenses, goals: s.goals, recurring: s.recurring,
      lastRecurring: s.lastRecurring, setup: s.setup, year: s.year
    }));
  };
  const syncEl = document.getElementById('sync-status');
  if (syncEl) { syncEl.textContent = '📱 Yerel mod'; syncEl.style.color = '#EF9F27'; }
}
</script>

.new-cat input{flex:1;min-width:180px;padding:9px 12px;border:.5px solid var(--bd2);border-radius:10px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--tx)}
.new-cat .pick{display:flex;align-items:center;gap:8px}
.new-cat .pick .emoji-preview{width:36px;height:36px;border-radius:10px;border:.5px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.new-cat .palette{display:flex;gap:4px;flex-wrap:wrap}
.empty-state{text-align:center;padding:2rem;color:var(--tx3);font-size:12px}
.total-row{font-weight:700;background:var(--bg2)}.total-row td{border-bottom:none!important;padding:10px 8px}
.txn-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--bd)}
.txn-item:last-child{border-bottom:none}
.fab{position:fixed;bottom:20px;right:20px;display:flex;gap:8px;z-index:50}
.fab button{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:20px;box-shadow:0 2px 12px rgba(0,0,0,.15);transition:transform .12s;display:flex;align-items:center;justify-content:center}
.fab button:active{transform:scale(.92)}
.fab .fab-g{background:var(--green);color:#fff}
.fab .fab-r{background:var(--red);color:#fff}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:.5px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom);display:none;justify-content:space-between}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--tx3);font-size:11px;padding:4px 0;cursor:pointer;font-family:inherit}
.tab-item .tab-icon{font-size:18px;line-height:1}
.tab-item .tab-label{font-size:9px}
.tab-item.act{color:var(--green)}
.tab-more-backdrop{position:fixed;inset:0;background:transparent;z-index:99;display:none}
.tab-more-menu{position:fixed;left:12px;right:12px;bottom:70px;background:var(--bg);border-radius:12px;border:.5px solid var(--bd);box-shadow:0 10px 30px rgba(0,0,0,.25);min-width:170px;z-index:101;display:none;padding:6px 0;max-height:60vh;overflow-y:auto}
.tab-more-item{padding:7px 14px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--tx)}
.tab-more-item span{font-size:18px}
.tab-more-item small{font-size:11px}
.tab-more-item:hover{background:var(--bg2)}
.toast{position:fixed;top:20px;right:20px;z-index:9999;border-radius:12px;padding:14px 20px;max-width:340px;font-size:13px;background:rgba(32,32,32,.97);color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.35);display:flex;align-items:flex-start;gap:10px;transform:translateX(120%);opacity:0;animation:toast-in .25s forwards}
.toast.warn{background:linear-gradient(135deg,#3b2f00,#2b2410);border:1px solid rgba(255,213,79,.5);color:#ffecb3}
.toast.danger{background:linear-gradient(135deg,#3b0000,#291010);border:1px solid rgba(244,67,54,.6);color:#ffcccb}
.toast + .toast{margin-top:10px}
.toast-title{font-weight:600;margin-bottom:2px}
.toast-body{font-size:12px;opacity:.9}
@keyframes toast-in{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toast-out{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.fade-up{opacity:0;transform:translateY(8px);animation:fadeUp .45s forwards cubic-bezier(.16,1,.3,1)}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.chart-appear{opacity:0;transform:translateY(10px);animation:chartIn .55s .12s forwards cubic-bezier(.16,1,.3,1)}
@keyframes chartIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.txn-anim{opacity:0;transform:translateY(6px);animation:fadeUp .4s forwards cubic-bezier(.16,1,.3,1)}
.net-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.net-ring{width:34px;height:34px;border-radius:50%;border:2px solid transparent;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(from 0deg,var(--green),var(--blue)) border-box}
.net-ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg2)}
.net-ring.net-neg{background:conic-gradient(from 0deg,var(--red),#D85A30) border-box}
.net-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(29,158,117,.6);animation:pulseDot 1.4s infinite}
.net-neg .net-dot{background:var(--red);box-shadow:0 0 0 0 rgba(226,75,74,.6)}
@keyframes pulseDot{to{box-shadow:0 0 0 10px rgba(0,0,0,0)}}
/* Android vb. cihazlarda TL simgesi (₺) için font – Noto Sans U+20BA içerir */
.tl{font-family:'Noto Sans',Roboto,sans-serif;font-feature-settings:normal}
@media(max-width:640px){
.sg{grid-template-columns:repeat(2,1fr)}
.gr2{grid-template-columns:1fr}
.shell{padding:8px;padding-left:max(8px,env(safe-area-inset-left));padding-right:max(8px,env(safe-area-inset-right))}
.tbl{font-size:10px}
.topbar{padding:12px 14px;padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}
.content{padding:14px}
.nav{display:none}
body{padding-bottom:70px}
.fab{right:max(12px,env(safe-area-inset-right));bottom:calc(82px + env(safe-area-inset-bottom))}
.tabbar{display:flex;padding-left:max(10px,env(safe-area-inset-left));padding-right:max(10px,env(safe-area-inset-right))}
.toast{left:12px;right:12px;max-width:none}
.bx{min-width:0}
.trend-stats{grid-template-columns:1fr}
.cat-name{min-width:100%}
.cat-tools{width:100%;justify-content:flex-start}
}
</style>
</head>
<body>
<div class="shell" id="app"></div>
<div class="fab" id="fabBtns" style="display:none">
<button class="fab-g" onclick="openM('income')" title="Gelir ekle">+</button>
<button class="fab-r" onclick="openM('expense')" title="Gider ekle">-</button>
</div>
<div class="tab-more-backdrop" id="tabMoreBackdrop"></div>
<div class="tab-more-menu" id="tabMoreMenu">
  <div class="tab-more-item" data-more-page="month"><span>📅</span><small>Aylık</small></div>
  <div class="tab-more-item" data-more-page="budget"><span>💎</span><small>Bütçe</small></div>
  <div class="tab-more-item" data-more-page="insights"><span>📊</span><small>Analiz</small></div>
  <div class="tab-more-item" data-more-page="settings"><span>⚙️</span><small>Ayarlar</small></div>
</div>
<div class="tabbar" id="tabBar"></div>

<script>
const PL=['#378ADD','#D4537E','#7F77DD','#1D9E75','#D85A30','#854F0B','#E24B4A','#EF9F27'];
const PBG=['#E6F1FB','#FBEAF0','#EEEDFE','#E1F5EE','#FAECE7','#FAEEDA','#FCEBEB','#FAEEDA'];
const MS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const DCATS=[
{key:'kira',name:'Kira / Aidat',icon:'🏠',color:'#7F77DD',bg:'#EEEDFE',budget:0},
{key:'market',name:'Market / Gıda',icon:'🛒',color:'#1D9E75',bg:'#E1F5EE',budget:0},
{key:'fatura',name:'Faturalar',icon:'📄',color:'#378ADD',bg:'#E6F1FB',budget:0},
{key:'ulasim',name:'Ulaşım / Yakıt',icon:'🚗',color:'#D85A30',bg:'#FAECE7',budget:0},
{key:'egitim',name:'Eğitim',icon:'📚',color:'#854F0B',bg:'#FAEEDA',budget:0},
{key:'saglik',name:'Sağlık',icon:'🏥',color:'#D4537E',bg:'#FBEAF0',budget:0},
{key:'giyim',name:'Giyim / Kişisel',icon:'👗',color:'#EF9F27',bg:'#FAEEDA',budget:0},
{key:'yemek',name:'Dışarıda yemek',icon:'🍽️',color:'#E24B4A',bg:'#FCEBEB',budget:0},
{key:'eglence',name:'Eğlence / Hobi',icon:'🎬',color:'#7F77DD',bg:'#EEEDFE',budget:0},
{key:'teknoloji',name:'Teknoloji / Abonelik',icon:'💻',color:'#1D9E75',bg:'#E1F5EE',budget:0},
{key:'kredi',name:'Kredi / Borç',icon:'💳',color:'#73726c',bg:'#F1EFE8',budget:0},
{key:'cocuk',name:'Çocuk giderleri',icon:'👶',color:'#D4537E',bg:'#FBEAF0',budget:0},
{key:'tasarruf',name:'Tasarruf / Yatırım',icon:'🥇',color:'#BA7517',bg:'#FAEEDA',budget:0},
{key:'diger',name:'Diğer',icon:'📦',color:'#B4B2A9',bg:'#F1EFE8',budget:0}
];

// Load from localStorage as fallback
function loadLocal(){try{const s=localStorage.getItem('aile_butce_v5');if(s)return JSON.parse(s)}catch(e){}return null}
const saved=loadLocal();

window.APP_STATE=saved?{
  ...saved,
  goals:saved.goals||[],
  recurring:saved.recurring||[],
  lastRecurring:saved.lastRecurring||null,
  page:'dashboard',
  month:new Date().getMonth(),
  filter:'all',
  modal:null,
  txFilter:{cat:'all',mem:'all',type:'all'}
}:{
  setup:true,
  members:[{name:'',color:PL[0],bg:PBG[0]},{name:'',color:PL[1],bg:PBG[1]}],
  cats:DCATS.map(c=>({...c})),
  income:[],
  expenses:[],
  goals:[],
  recurring:[],
  lastRecurring:null,
  page:'dashboard',
  month:new Date().getMonth(),
  year:2025,
  filter:'all',
  modal:null,
  txFilter:{cat:'all',mem:'all',type:'all'}
};
const A=window.APP_STATE;
window.showToast=(msg,type='warn')=>{
const host=document.body;
const wrapId='toast-container';
let wrap=document.getElementById(wrapId);
if(!wrap){wrap=document.createElement('div');wrap.id=wrapId;wrap.style.position='fixed';wrap.style.top='20px';wrap.style.right='20px';wrap.style.left='auto';wrap.style.zIndex='9999';wrap.style.display='flex';wrap.style.flexDirection='column';host.appendChild(wrap);}
const el=document.createElement('div');
el.className='toast '+(type==='danger'?'danger':'warn');
el.innerHTML=`<div class="toast-body">${msg}</div>`;
wrap.appendChild(el);
setTimeout(()=>{el.style.animation='toast-out .25s forwards';el.addEventListener('animationend',()=>{el.remove();if(wrap&&wrap.children.length===0)wrap.remove();},{once:true});},4000);
};

const fmt=n=>{if(!n&&n!==0)return'—';return Math.round(n).toLocaleString('tr-TR')+'<span class="tl" aria-hidden="true">₺</span>'};
const fmtPlain=n=>{if(!n&&n!==0)return'—';return Math.round(n).toLocaleString('tr-TR')+' TL'};
const fmtTooltip=n=>{if(n==null||n===undefined||isNaN(n))return'—';return Math.round(n).toLocaleString('tr-TR')+'₺'};
const fmtK=n=>{if(!n&&n!==0)return'—';const a=Math.abs(n);if(a>=1e6)return(n<0?'-':'')+(a/1e6).toFixed(1)+'M';if(a>=1000)return(n<0?'-':'')+(a/1000).toFixed(a>=1e4?0:1)+'K';return Math.round(n)+''};
let CHART_TOOLTIP_STYLE={backgroundColor:'rgba(28,28,30,0.96)',titleColor:'#f5f5f5',bodyColor:'#e5e5e5',borderColor:'rgba(255,255,255,0.12)',borderWidth:1,cornerRadius:10,padding:12,boxPadding:6,titleFont:{size:12},bodyFont:{size:11},displayColors:true,intersect:false,mode:'index'};
if(typeof Chart!=='undefined'){Chart.defaults.plugins.tooltip={...Chart.defaults.plugins.tooltip,...CHART_TOOLTIP_STYLE};Chart.defaults.interaction={mode:'index',intersect:false};}
let CHS=[];function dc(){CHS.forEach(c=>c.destroy());CHS=[]}
function allM(){return[{id:'all',name:'Herkes',initials:'H',color:'#1D9E75',bg:'#E1F5EE'},...A.members.map((m,i)=>({id:'m'+i,name:m.name,initials:m.name.charAt(0).toUpperCase(),color:m.color,bg:m.bg}))]}
function gG(mi){return A.income.filter(x=>x.month===mi).reduce((a,x)=>a+x.amount,0)}
function gE(mi){return A.expenses.filter(x=>x.month===mi).reduce((a,x)=>a+x.amount,0)}
function cT(ck,mi){return A.expenses.filter(x=>x.cat===ck&&(mi===undefined||x.month===mi)).reduce((a,x)=>a+x.amount,0)}

function ensureRecurringApplied(){
const key=A.year+'-'+A.month;
if(!A.recurring||!A.recurring.length)return;
if(A.lastRecurring===key)return;
A.recurring.forEach(r=>{
  const amt=r.amount||0;
  if(amt<=0)return;
  if(r.type==='income'){
    const exists=A.income.some(x=>x.month===A.month&&x.member===r.member&&x.amount===amt&&x.desc===r.desc);
    if(!exists)A.income.push({member:r.member,desc:r.desc||'Gelir',amount:amt,month:A.month});
  }else if(r.type==='expense'){
    const exists=A.expenses.some(x=>x.month===A.month&&x.member===r.member&&x.amount===amt&&x.desc===r.desc&&x.cat===r.cat);
    if(!exists)A.expenses.push({cat:r.cat,desc:r.desc||'',member:r.member,amount:amt,month:A.month});
  }
});
A.lastRecurring=key;
}

function sync(){
if(window.syncToFirebase)window.syncToFirebase();
else{localStorage.setItem('aile_butce_v5',JSON.stringify({members:A.members,cats:A.cats,income:A.income,expenses:A.expenses,goals:A.goals,recurring:A.recurring,lastRecurring:A.lastRecurring,setup:A.setup,year:A.year}))}
}

function R(){
ensureRecurringApplied();
dc();sync();const a=document.getElementById('app');
document.getElementById('fabBtns').style.display=A.setup?'none':'flex';
if(A.setup){var tb=document.getElementById('tabBar');if(tb)tb.style.display='none';rSetup(a);}
else{
var tbc=document.getElementById('tabBar');
if(tbc){tbc.style.display='';tbc.innerHTML=tabBarHTML();}
if(A.page==='dashboard')rDash(a);
else if(A.page==='income')rIncome(a);
else if(A.page==='month')rMonth(a);
else if(A.page==='transactions')rTxns(a);
else if(A.page==='budget')rBudget(a);
else if(A.page==='insights')rInsights(a);
else if(A.page==='goals')rGoals(a);
else if(A.page==='settings')rSettings(a);
}
}
window.renderApp=R;
function getEffectiveTheme(){var t=document.documentElement.getAttribute('data-theme');if(t)return t;return window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
function toggleTheme(){var next=getEffectiveTheme()==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('theme',next);R();}
window.toggleTheme=toggleTheme;

function rSetup(a){
a.innerHTML=`<div class="setup-page"><h1>Aile <span>Bütçesi</span></h1><p class="sub">Aile üyelerinizi ekleyin ve başlayın</p>
<div class="setup-section"><h3>Aile üyeleri</h3>
${A.members.map((m,i)=>`<div class="mem-input-row">
<input type="text" placeholder="${i===0?'Örn: Murat':i===1?'Örn: Sıdıka':'İsim...'}" value="${m.name}" data-mi="${i}">
<div style="display:flex;gap:3px">${PL.map((c,ci)=>`<div class="col-dot ${m.color===c?'sel':''}" style="background:${c}" data-mi="${i}" data-ci="${ci}"></div>`).join('')}</div>
${A.members.length>1?`<button class="rm-btn" data-rm="${i}">×</button>`:''}
</div>`).join('')}
<button class="btn" style="margin-top:8px" id="addM">+ Üye ekle</button></div>
<button class="start-btn" id="goBtn">Başlayalım</button>
<p style="text-align:center;margin-top:16px;font-size:11px;color:var(--tx3)"><span id="sync-status-setup"></span></p></div>`;
document.querySelectorAll('input[data-mi]').forEach(el=>{el.oninput=()=>{A.members[+el.dataset.mi].name=el.value}});
document.querySelectorAll('.col-dot').forEach(el=>{el.onclick=()=>{A.members[+el.dataset.mi].color=PL[+el.dataset.ci];A.members[+el.dataset.mi].bg=PBG[+el.dataset.ci];R()}});
document.querySelectorAll('[data-rm]').forEach(el=>{el.onclick=()=>{A.members.splice(+el.dataset.rm,1);R()}});
document.getElementById('addM').onclick=()=>{const ci=A.members.length%PL.length;A.members.push({name:'',color:PL[ci],bg:PBG[ci]});R()};
document.getElementById('goBtn').onclick=()=>{A.members=A.members.filter(m=>m.name.trim());if(!A.members.length)A.members=[{name:'Ben',color:PL[0],bg:PBG[0]}];A.setup=false;R()};
}

function topbar(){
const ms=allM();
return`<div class="topbar"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<h1>Aile <span>Bütçesi</span></h1>
<div class="fav">${ms.filter(m=>m.id!=='all').map(m=>`<div class="av ${A.filter===m.id?'act':''}" style="background:${m.bg};color:${m.color}" data-mem="${m.id}" title="${m.name}">${m.initials}</div>`).join('')}</div>
<span class="sync-badge" id="sync-status">...</span>
</div><div class="nav">
<button data-pg="dashboard" class="${A.page==='dashboard'?'act':''}">Genel</button>
<button data-pg="income" class="${A.page==='income'?'act':''}">Gelir</button>
<button data-pg="month" class="${A.page==='month'?'act':''}">Aylık</button>
<button data-pg="transactions" class="${A.page==='transactions'?'act':''}">İşlemler</button>
<button data-pg="budget" class="${A.page==='budget'?'act':''}">Bütçe</button>
<button data-pg="goals" class="${A.page==='goals'?'act':''}">Hedefler</button>
<button data-pg="insights" class="${A.page==='insights'?'act':''}">Analiz</button>
<button type="button" class="theme-toggle" onclick="toggleTheme()" title="Tema değiştir">${document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'}</button>
<button data-pg="settings" class="${A.page==='settings'?'act':''}">⚙️</button>
</div></div>`}

function tabBarHTML(){
const p=A.page;
return `<button class="tab-item ${p==='dashboard'?'act':''}" data-tab="dashboard"><div class="tab-icon">🏠</div><div class="tab-label">Genel</div></button>
<button class="tab-item ${p==='income'?'act':''}" data-tab="income"><div class="tab-icon">💰</div><div class="tab-label">Gelir</div></button>
<button class="tab-item ${p==='transactions'?'act':''}" data-tab="transactions"><div class="tab-icon">📋</div><div class="tab-label">İşlemler</div></button>
<button class="tab-item ${p==='goals'?'act':''}" data-tab="goals"><div class="tab-icon">🎯</div><div class="tab-label">Hedefler</div></button>
<button class="tab-item" id="tabMoreToggle"><div class="tab-icon">☰</div><div class="tab-label">Daha</div></button>`;
}
function bind(){
document.querySelectorAll('[data-pg]').forEach(b=>b.onclick=()=>{A.page=b.dataset.pg;R()});
document.querySelectorAll('[data-mem]').forEach(b=>b.onclick=()=>{A.filter=A.filter===b.dataset.mem?'all':b.dataset.mem;R()});
document.querySelectorAll('[data-dir]').forEach(b=>b.onclick=()=>{A.month=Math.max(0,Math.min(11,A.month+parseInt(b.dataset.dir)));R()});
const tabs=document.querySelectorAll('.tab-item[data-tab]');
tabs.forEach(b=>{b.classList.toggle('act',b.dataset.tab===A.page);b.onclick=()=>{A.page=b.dataset.tab;R();}});
const moreToggle=document.getElementById('tabMoreToggle');
const moreMenu=document.getElementById('tabMoreMenu');
const moreBackdrop=document.getElementById('tabMoreBackdrop');
if(moreToggle&&moreMenu&&moreBackdrop){
  moreToggle.onclick=()=>{
    const vis=moreMenu.style.display==='block';
    moreMenu.style.display=vis?'none':'block';
    moreBackdrop.style.display=vis?'none':'block';
  };
  moreBackdrop.onclick=()=>{moreMenu.style.display='none';moreBackdrop.style.display='none';};
  moreMenu.querySelectorAll('[data-more-page]').forEach(it=>{
    it.onclick=()=>{
      const p=it.getAttribute('data-more-page');
      if(p){A.page=p;R();}
      moreMenu.style.display='none';moreBackdrop.style.display='none';
    };
  });
}
}
function mNav(){return`<div class="mn"><button data-dir="-1">&#8592;</button><span>${MS[A.month]} ${A.year}</span><button data-dir="1">&#8594;</button></div>`}

function rDash(a){
const gs=MS.map((_,i)=>gG(i)),es=MS.map((_,i)=>gE(i));
const tG=gs.reduce((a,b)=>a+b,0),tE=es.reduce((a,b)=>a+b,0),tK=tG-tE;
const mi=A.month;const ms=allM();
let ct=A.cats.map(c=>({...c,total:A.expenses.filter(x=>x.cat===c.key).reduce((a,x)=>a+x.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
const mx=ct[0]?.total||1;
const mAll=[...A.income.filter(x=>x.month===mi).map(t=>({...t,_t:'in'})),...A.expenses.filter(x=>x.month===mi).map(t=>({...t,_t:'ex'}))].sort((a,b)=>b.amount-a.amount);
a.innerHTML=`${topbar()}<div class="content">
<div class="sg">
<div class="sc"><div class="lb">Toplam gelir</div><div class="vl" style="color:var(--green)">${fmt(tG)}</div></div>
<div class="sc"><div class="lb">Toplam gider</div><div class="vl" style="color:var(--red)">${fmt(tE)}</div></div>
<div class="sc"><div class="lb">Net durum</div><div class="vl" style="color:${tK>=0?'var(--green)':'var(--red)'}">${fmt(tK)}</div></div>
<div class="sc"><div class="lb">${MS[mi]} kalan</div><div class="vl" style="color:${gs[mi]-es[mi]>=0?'var(--green)':'var(--red)'}">${fmt(gs[mi]-es[mi])}</div></div></div>

function rMonth(a){
const mi=A.month;const g=gG(mi),e=gE(mi),k=g-e;
const pg=mi>0?gG(mi-1):0,pe=mi>0?gE(mi-1):0;
const gCh=pg>0?Math.round((g-pg)/pg*100):null;
const eCh=pe>0?Math.round((e-pe)/pe*100):null;
const kPrev=pg-pe;const kCh=kPrev!==0?Math.round((k-kPrev)/Math.abs(kPrev)*100):null;
const mExp=A.expenses.filter(x=>x.month===mi);const mCount=mExp.length;
const prevCount=mi>0?A.expenses.filter(x=>x.month===mi-1).length+A.income.filter(x=>x.month===mi-1).length:0;
const countCh=prevCount>0?Math.round((mCount-prevCount)/prevCount*100):null;
const hasPrev=mi>0;
let catMap={};mExp.forEach(x=>{catMap[x.cat]=(catMap[x.cat]||0)+x.amount});
let cd=A.cats.map(c=>{
const value=catMap[c.key]||0;
const prevValue=hasPrev?cT(c.key,mi-1):0;
const chPct=prevValue>0?Math.round((value-prevValue)/prevValue*100):null;
return{...c,value,prevValue,chPct};
}).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);const mx=cd[0]?.value||1;
const badge=(ch,isGainGood)=>ch===null?'':`<span class="month-badge ${(ch>=0&&isGainGood)||(ch<0&&!isGainGood)?'up':'down'}">${ch>=0?'↑':'↓'}%${Math.abs(ch)}</span>`;
const sbText=(ch,isGainGood)=>ch===null?'':`<div class="sb">Geçen aya göre %${Math.abs(ch)} ${ch>0?'artış':'azalış'}</div>`;
a.innerHTML=`${topbar()}<div class="content"><div style="margin-bottom:14px">${mNav()}</div>
<div class="sg">
<div class="sc sc-gelir fade-up" style="animation-delay:.02s"><div class="lb">Gelir</div><div class="vl" style="color:var(--green)">${fmt(g)}</div>${gCh!==null?sbText(gCh,true):''}${badge(gCh,true)}</div>
<div class="sc sc-gider fade-up" style="animation-delay:.06s"><div class="lb">Gider</div><div class="vl" style="color:var(--red)">${fmt(e)}</div>${eCh!==null?sbText(eCh,false):''}${badge(eCh,false)}</div>
<div class="sc sc-net fade-up" style="animation-delay:.1s"><div class="lb">Kalan</div><div class="vl" style="color:${k>=0?'var(--green)':'var(--red)'}">${fmt(k)}</div>${kCh!==null?sbText(kCh,true):''}${badge(kCh,true)}</div>
<div class="sc fade-up" style="animation-delay:.14s"><div class="lb">İşlem</div><div class="vl">${mCount}</div>${countCh!==null?`<div class="sb">Geçen aya göre %${Math.abs(countCh)} ${countCh>0?'artış':'azalış'}</div>${badge(countCh,true)}`:''}</div></div>
<div class="gr gr2"><div class="bx fade-up" style="animation-delay:.18s"><h3>Kategoriler</h3>
${cd.length?cd.map(c=>{const p=e>0?Math.round(c.value/e*100):0;const ov=c.budget>0&&c.value>c.budget;
const prevLine=c.prevValue>0?`<div class="cat-prev">Geçen ay: ${fmt(c.prevValue)}</div>`:(hasPrev?'<div class="cat-prev">Geçen ay: 0 ₺</div>':'<div class="cat-prev">İlk ay</div>');
const catBadge=c.chPct!==null?`<span class="month-badge ${c.chPct>0?'down':'up'}">${c.chPct>=0?'↑':'↓'}%${Math.abs(c.chPct)}</span>`:(hasPrev?'':'<span class="month-badge up">İlk ay</span>');
return`<div class="cr"><div class="ic" style="background:${c.bg}">${c.icon}</div><div class="inf"><div class="nm">${c.name}<span class="p">${p}%${ov?' <span style="color:var(--red)">aşım!</span>':''}</span></div>${prevLine}<div class="bt"><div class="bf" style="width:${Math.min(Math.round(c.value/mx*100),100)}%;background:${ov?'var(--red)':c.color}"></div></div></div><div class="am am-wrap" style="${ov?'color:var(--red)':''}">${fmt(c.value)}<div>${catBadge}</div></div></div>`}).join(''):'<div class="empty-state">Gider yok</div>'}
</div><div class="bx"><h3>Dağılım</h3>${cd.length?`<div style="position:relative;height:220px"><canvas id="mP"></canvas></div>`:'<div class="empty-state">—</div>'}</div></div>
<div class="bx fade-up" style="animation-delay:.22s;margin-top:12px"><h3>Bu ay vs geçen ay ${!hasPrev?'<span class="tg">İlk ay</span>':''}</h3><div style="position:relative;height:260px"><canvas id="mBar"></canvas></div></div>
</div>${renderMdl()}`;bind();
if(cd.length){const ctx=document.getElementById('mP');if(ctx){const totalM=e||1;const c=new Chart(ctx,{type:'doughnut',data:{labels:cd.map(c=>c.name),datasets:[{data:cd.map(c=>c.value),backgroundColor:cd.map(c=>c.color),borderWidth:0,hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{...CHART_TOOLTIP_STYLE,callbacks:{title:ctx=>ctx[0].label,label:ctx=>{const pct=totalM>0?Math.round((ctx.raw/totalM)*100):0;return ctx.label+' · '+fmtTooltip(ctx.raw)+' · %'+pct}}}}}});CHS.push(c)}}
const chartCats=A.cats.map(c=>({...c,valNow:cT(c.key,mi),valPrev:hasPrev?cT(c.key,mi-1):0}))
  .filter(c=>c.valNow>0||c.valPrev>0)
  .sort((a,b)=>b.valNow-a.valNow||b.valPrev-a.valPrev);
if(chartCats.length){
  const ctxBar=document.getElementById('mBar');
  if(ctxBar){
    const labels=chartCats.map(c=>c.name);
    const dataNow=chartCats.map(c=>c.valNow);
    const dataPrev=chartCats.map(c=>c.valPrev);
    const cBar=new Chart(ctxBar,{
      type:'bar',
      data:{labels:labels,datasets:[
        {label:'Bu ay',data:dataNow,backgroundColor:'#378ADD',borderRadius:4,barPercentage:.45,categoryPercentage:.75},
        {label:hasPrev?'Geçen ay':'Geçen ay (yok)',data:dataPrev,backgroundColor:'#9b9b9b',borderRadius:4,barPercentage:.45,categoryPercentage:.75}
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'top'},
          tooltip:{...CHART_TOOLTIP_STYLE,callbacks:{
            title:t=>t[0].label,
            label:t=>{
              const v=t.raw;
              const prev=t.datasetIndex===0?dataPrev[t.dataIndex]:dataNow[t.dataIndex];
              let s=t.dataset.label+': '+fmtTooltip(v);
              if(t.datasetIndex===0&&prev>0){
                const pct=Math.round((v-prev)/prev*100);
                s+=' · Geçen aya göre %'+Math.abs(pct)+(pct>=0?' artış':' azalış');
              }else if(t.datasetIndex===0&&!hasPrev){
                s+=' · İlk ay';
              }
              return s;
            }
          }}
        },
        scales:{
          y:{ticks:{callback:v=>fmtK(v),font:{size:10},color:'#999'},grid:{color:'rgba(128,128,128,.1)'}},
          x:{ticks:{font:{size:10},color:'#999'},grid:{display:false}}
        }
      }
    });
    CHS.push(cBar);
  }
}
}

function catMonthlySeries(catKey){
  const arr=new Array(12).fill(0);
  A.expenses.forEach(x=>{if(x.cat===catKey)arr[x.month]=(arr[x.month]||0)+(x.amount||0);});
  return arr;
}
function statsForSeries(series){
  const avg=series.reduce((a,b)=>a+b,0)/12;
  let maxV=-Infinity,maxI=0;
  for(let i=0;i<series.length;i++){if(series[i]>maxV){maxV=series[i];maxI=i;}}
  let minV=Infinity,minI=-1;
  for(let i=0;i<series.length;i++){const v=series[i];if(v>0 && v<minV){minV=v;minI=i;}}
  return {avg:avg,max:{i:maxI,v:maxV},min:{i:minI,v:minI>=0?minV:0,has:minI>=0}};
}

window.downloadPDF=async()=>{
  try{
    if(!window.jspdf||!window.jspdf.jsPDF){alert('PDF kütüphanesi yüklenemedi. İnternet bağlantınızı kontrol edin.');return;}
    if(typeof window.showToast==='function')window.showToast('PDF hazırlanıyor...','warn');

    const jsPDF=window.jspdf.jsPDF;
    const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});

    async function loadFont() {
      const res = await fetch('https://cdn.jsdelivr.net/npm/@pdfme/common/dist/assets/fonts/Roboto-Regular.ttf');
      const buf = await res.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let binary = '';
      for(let i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    const year=A.year||new Date().getFullYear();
    const pad=n=>String(n).padStart(2,'0');
    const now=new Date();
    const today=pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear();
    const monthsShort=['OCA','ŞUB','MAR','NİS','MAY','HAZ','TEM','AĞU','EYL','EKİ','KAS','ARA'];
    const money=v=>(Math.round(v||0)).toLocaleString('tr-TR')+' TL';
    const members=allM();
    const memName=id=>{const m=members.find(x=>x.id===id);return m?m.name:'—';};

    let useFallback=false;
    let tableFont='Roboto';
    try{
      const fontBase64 = await loadFont();
      doc.addFileToVFS('Roboto-Regular.ttf', fontBase64);
      doc.addFont('Roboto-Regular.ttf', 'Roboto', 'normal');
      doc.setFont('Roboto');
    }catch(e){
      useFallback=true;
      tableFont='helvetica';
      try{doc.setFont('helvetica','normal');}catch(_){} // fallback
    }

    function fallbackClean(s) {
      if(!s) return '';
      var map = {'ş':'s','Ş':'S','ı':'i','İ':'I','ü':'u','Ü':'U','ö':'o','Ö':'O','ç':'c','Ç':'C','ğ':'g','Ğ':'G'};
      return String(s)
        .replace(/[şŞıİüÜöÖçÇğĞ]/g, function(ch){ return map[ch] || ''; })
        .replace(/—/g,'-')
        .replace(/₺/g,'TL');
    }
    const clean=v=>useFallback?fallbackClean(v):String(v);

    // Ensure Roboto is selected before any text drawing.
    try{doc.setFont(tableFont);}catch(e){}

    let y=18;
    doc.setFontSize(18);
    try{doc.setFont(undefined,'bold');}catch(e){}
    doc.text(clean('Aile Bütçe Raporu - '+year),14,y);
    y+=8;
    doc.setFontSize(10);
    try{doc.setFont(undefined,'normal');}catch(e){}
    doc.text(clean('Oluşturulma tarihi: '+today),14,y);
    y+=6;

    // Table 1: Monthly summary
    doc.setFontSize(12);
    try{doc.setFont(undefined,'bold');}catch(e){}
    doc.text(clean('Aylık Özet'),14,y);
    y+=3;
    try{doc.setFont(undefined,'normal');}catch(e){}

    const monthlyRows=[];
    let sumG=0,sumE=0,sumK=0;
    for(let mi=0;mi<12;mi++){
      const g=A.income.filter(x=>x.month===mi).reduce((a,x)=>a+(x.amount||0),0);
      const e=A.expenses.filter(x=>x.month===mi).reduce((a,x)=>a+(x.amount||0),0);
      const k=g-e;
      sumG+=g;sumE+=e;sumK+=k;
      monthlyRows.push([clean(monthsShort[mi]),clean(money(g)),clean(money(e)),clean(money(k))]);
    }
    monthlyRows.push([clean('TOPLAM'),clean(money(sumG)),clean(money(sumE)),clean(money(sumK))]);
    doc.autoTable({
      startY:y+2,
      head:[[clean('Ay'),clean('Gelir'),clean('Gider'),clean('Kalan')]],
      body:monthlyRows,
      theme:'grid',
      styles:{fontSize:9,cellPadding:2,font:tableFont},
      headStyles:{fillColor:[29,158,117],textColor:255,fontStyle:'bold',font:tableFont},
      didParseCell:(data)=>{
        if(data.row.index===monthlyRows.length-1){data.cell.styles.fontStyle='bold';}
      }
    });
    y=doc.lastAutoTable.finalY+8;

    // Table 2: Category expenses
    doc.setFontSize(12);
    try{doc.setFont(undefined,'bold');}catch(e){}
    doc.text(clean('Kategori Bazlı Harcamalar'),14,y);
    try{doc.setFont(undefined,'normal');}catch(e){}
    const catTotals=A.cats.map(c=>{
      const total=A.expenses.filter(x=>x.cat===c.key).reduce((a,x)=>a+(x.amount||0),0);
      return {c,total};
    }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
    const totalExp=catTotals.reduce((a,x)=>a+x.total,0)||1;
    const catRows=catTotals.map(x=>{
      const avg=x.total/12;
      const pct=Math.round((x.total/totalExp)*1000)/10;
      // Emoji icon removed; only category name
      return [clean(x.c.name||''),clean(money(x.total)),clean(money(avg)),clean(String(pct))];
    });
    doc.autoTable({
      startY:y+2,
      head:[[clean('Kategori'),clean('Toplam'),clean('Aylık Ort.'),clean('Pay(%)')]],
      body:catRows.length?catRows:[['-','-','-','-']],
      theme:'grid',
      styles:{fontSize:9,cellPadding:2,font:tableFont},
      headStyles:{fillColor:[55,138,221],textColor:255,fontStyle:'bold',font:tableFont}
    });
    y=doc.lastAutoTable.finalY+8;

    // Table 3: Income sources
    doc.setFontSize(12);
    try{doc.setFont(undefined,'bold');}catch(e){}
    doc.text(clean('Gelir Kaynakları'),14,y);
    try{doc.setFont(undefined,'normal');}catch(e){}
    const incRows=A.income.map(t=>[
      clean(t.desc||'Gelir'),
      clean(memName(t.member)),
      clean(monthsShort[t.month]||''),
      clean(money(t.amount||0))
    ]);
    doc.autoTable({
      startY:y+2,
      head:[[clean('Açıklama'),clean('Kişi'),clean('Ay'),clean('Tutar')]],
      body:incRows.length?incRows:[['-','-','-','-']],
      theme:'grid',
      styles:{fontSize:9,cellPadding:2,font:tableFont},
      headStyles:{fillColor:[226,75,74],textColor:255,fontStyle:'bold',font:tableFont}
    });

    // Footer: page numbers
    const pageCount=doc.internal.getNumberOfPages();
    for(let p=1;p<=pageCount;p++){
      doc.setPage(p);
      doc.setFontSize(9);
      const w=doc.internal.pageSize.getWidth();
      const h=doc.internal.pageSize.getHeight();
      doc.text(clean('Sayfa '+p+' / '+pageCount),w-14,h-8,{align:'right'});
    }

    doc.save(`aile-butce-rapor-${year}.pdf`);
    if(typeof window.showToast==='function')window.showToast('PDF indirildi','warn');
  }catch(e){
    console.error(e);
    alert('PDF oluşturulamadı.');
  }
};

window.updateCatName=(idx,name)=>{if(!A.cats||!A.cats[idx])return;A.cats[idx].name=name;sync();};

window.deleteCat=(idx)=>{
  if(!A.cats||!A.cats[idx])return;
  const cat=A.cats[idx];
  const cnt=A.expenses.filter(x=>x.cat===cat.key).length;
  if(cnt>0){
    if(!confirm(`Bu kategoride ${cnt} işlem var, silmek istediğinize emin misiniz?`))return;
  }else{
    if(!confirm('Kategoriyi silmek istediğinize emin misiniz?'))return;
  }
  A.expenses=A.expenses.filter(x=>x.cat!==cat.key);
  A.cats.splice(idx,1);
  A.catEditOpenKey=null;
  sync();R();
};

window.setNewCatColor=(ci)=>{A.newCatDraft=A.newCatDraft||{name:'',icon:'📦',ci:0};A.newCatDraft.ci=ci;R();};
window.addNewCat=()=>{
  A.newCatDraft=A.newCatDraft||{name:'',icon:'📦',ci:0};
  const name=(A.newCatDraft.name||'').trim();
  if(!name){alert('Kategori adı gerekli');return;}
  const icon=A.newCatDraft.icon||'📦';
  const ci=typeof A.newCatDraft.ci==='number'?A.newCatDraft.ci:0;
  const key=('cat_'+name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-ığüşöç]/gi,'')+'_'+Date.now()).slice(0,60);
  if(A.cats.some(c=>c.key===key)){alert('Kategori anahtarı çakıştı, tekrar deneyin');return;}
  A.cats.push({key:key,name:name,icon:icon,color:PL[ci],bg:PBG[ci],budget:0});
  A.newCatDraft={name:'',icon:'📦',ci:0,open:false};
  sync();R();
};

window.saveInc=()=>{const amt=parseFloat((document.getElementById('mAmt')?.value||'').replace(/,/g,'.'))||0;if(amt<=0)return;A.income.push({member:document.getElementById('mMem').value,desc:document.getElementById('mDesc').value||'Gelir',amount:amt,month:+document.getElementById('mMo').value});A.modal=null;R()};
window.saveExp=()=>{const amt=parseFloat((document.getElementById('mAmt')?.value||'').replace(/,/g,'.'))||0;if(amt<=0)return;const catKey=document.getElementById('mCat').value;const mo=+document.getElementById('mMo').value;A.expenses.push({cat:catKey,desc:document.getElementById('mDesc').value||'',member:document.getElementById('mMem').value,amount:amt,month:mo});const cat=A.cats.find(c=>c.key===catKey);if(cat&&cat.budget>0){const used=cT(catKey,mo);const pct=Math.round((used/cat.budget)*100);if(pct>=80&&pct<100){window.showToast(`⚠️ ${cat.name} bütçesinin %${pct}'i kullanıldı`,'warn');}else if(pct>=100){window.showToast(`🔴 ${cat.name} bütçesi aşıldı! (${fmt(used)} / ${fmt(cat.budget)})`,'danger');}}A.modal=null;R()};
window.saveBdg=()=>{document.querySelectorAll('[data-bk]').forEach(el=>{const c=A.cats.find(c=>c.key===el.dataset.bk);if(c)c.budget=parseFloat((el.value||'').replace(/,/g,'.'))||0});A.modal=null;R()};
window.saveRecurring=function(idx){if(!Array.isArray(A.recurring))A.recurring=[];var raw=(document.getElementById('rAmt')&&document.getElementById('rAmt').value)||'';var amt=parseFloat(String(raw).replace(/,/g,'.'));if(!(amt>0))return;var type=(document.getElementById('rType')&&document.getElementById('rType').value)==='expense'?'expense':'income';var desc=((document.getElementById('rDesc')&&document.getElementById('rDesc').value)||'').trim();var member=(document.getElementById('rMem')&&document.getElementById('rMem').value)||'';var cat=(document.getElementById('rCat')&&document.getElementById('rCat').value)||'';var item={type:type,desc:desc,amount:amt,member:member};if(type==='expense')item.cat=cat;if(typeof idx==='number'&&idx>=0&&A.recurring[idx])A.recurring[idx]=item;else A.recurring.push(item);A.modal=null;if(window.syncToFirebase)window.syncToFirebase();R();};

const m=meta[type]||meta.diger;
A.goals.push({name,target,current,icon:m.icon,color:m.color,type});
A.modal=null;R();};
