<!-- 
  ADIM 1: https://console.firebase.google.com adresine gidin
  ADIM 2: "Proje Ekle" tıklayın, isim verin (örn: aile-butce)
  ADIM 3: Google Analytics'i kapatabilirsiniz, "Proje oluştur"
  ADIM 4: Sol menüden "Realtime Database" > "Veritabanı oluştur"
  ADIM 5: Konum seçin (europe-west1), "Test modunda başla" seçin
  ADIM 6: Proje ayarları (⚙️) > Genel > "Web uygulaması ekle" (</> ikonu)
  ADIM 7: İsim verin, "Firebase Hosting"i işaretlemeyin, "Uygulamayı kaydet"
  ADIM 8: Size verilen config değerlerini aşağıya yapıştırın
-->

<script type="module">
// ============================================================
// 🔥 BURAYA FIREBASE CONFIG'İNİZİ YAPIŞTIRIN
// ============================================================
// Firebase konsolundan aldığınız değerleri buraya koyun:

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBJ0NkI2nexQGwXEN0wYorNkQkFqTnkc6k",
  authDomain: "familybudget-823c9.firebaseapp.com",
  databaseURL: "https://familybudget-823c9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "familybudget-823c9",
  storageBucket: "familybudget-823c9.firebasestorage.app",
  messagingSenderId: "715932023457",
  appId: "1:715932023457:web:ae38e0c2c5bf9249570ee0"
};

// ============================================================
// Firebase'i config'siz de çalıştır (local mode)  
// ============================================================
const IS_FIREBASE = FIREBASE_CONFIG.apiKey !== "BURAYA-API-KEY";

let db = null;
let dbRef = null;

if (IS_FIREBASE) {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const { getDatabase, ref, onValue, set } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
  
  const app = initializeApp(FIREBASE_CONFIG);
  db = getDatabase(app);
  dbRef = ref(db, 'butce');
  
  // Realtime listener - eşin girdiği veri anında gelir
  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      window.APP_STATE.members = data.members || [];
      window.APP_STATE.cats = data.cats || window.APP_STATE.cats;
      window.APP_STATE.income = data.income || [];
      window.APP_STATE.expenses = data.expenses || [];
      window.APP_STATE.goals = data.goals || [];
      window.APP_STATE.recurring = data.recurring || [];
      window.APP_STATE.lastRecurring = data.lastRecurring || null;
      window.APP_STATE.netWorth = data.netWorth || {assets:[],liabilities:[]};
      window.APP_STATE.netWorthHistory = data.netWorthHistory || [];
      window.APP_STATE.setup = data.setup !== undefined ? data.setup : true;
      window.APP_STATE.year = data.year || 2025;
      window.renderApp();
    }
  });
  
  window.syncToFirebase = () => {
    const s = window.APP_STATE;
    set(dbRef, {
      members: s.members,
      cats: s.cats,
      income: s.income,
      expenses: s.expenses,
      goals: s.goals,
      recurring: s.recurring,
      lastRecurring: s.lastRecurring,
      netWorth: s.netWorth,
      netWorthHistory: s.netWorthHistory||[],
      setup: s.setup,
      year: s.year
    });
  };

  const syncEl = document.getElementById('sync-status');
  if (syncEl) { syncEl.textContent = '🟢 Bağlı'; syncEl.style.color = '#1D9E75'; }
} else {
  // Firebase yoksa localStorage kullan
  window.syncToFirebase = () => {
    const s = window.APP_STATE;
    localStorage.setItem('aile_butce_v5', JSON.stringify({
      members: s.members, cats: s.cats, income: s.income,
      expenses: s.expenses, goals: s.goals, recurring: s.recurring,
      lastRecurring: s.lastRecurring, netWorth: s.netWorth, netWorthHistory: s.netWorthHistory||[], setup: s.setup, year: s.year
    }));
  };
  const syncEl = document.getElementById('sync-status');
  if (syncEl) { syncEl.textContent = '📱 Yerel mod'; syncEl.style.color = '#EF9F27'; }
}
</script>

.trend-stat .k{font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.trend-stat .v{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.trend-stat .s{font-size:10px;color:var(--tx3);margin-top:2px}
.cat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--bd);flex-wrap:wrap}
.cat-row:last-child{border-bottom:none}
.cat-ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--bg2);border:.5px solid var(--bd)}
.cat-name{flex:1;min-width:160px}
.cat-name input{width:100%;padding:8px 10px;border:.5px solid var(--bd2);border-radius:10px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--tx)}
.cat-tools{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cat-color-dot{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.cat-color-dot.sel{border-color:var(--tx)}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:10px}
.emoji-btn{height:34px;border-radius:10px;border:.5px solid var(--bd);background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.emoji-btn:hover{background:var(--bg2)}
.cat-emoji-panel{display:none;width:100%;margin-top:8px;background:var(--bg2);border:.5px solid var(--bd);border-radius:12px;padding:10px}
.cat-emoji-panel.open{display:block}
.new-cat{margin-top:12px;padding-top:12px;border-top:.5px dashed var(--bd)}
.new-cat .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.new-cat input{flex:1;min-width:180px;padding:9px 12px;border:.5px solid var(--bd2);border-radius:10px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--tx)}
.new-cat .pick{display:flex;align-items:center;gap:8px}
.new-cat .pick .emoji-preview{width:36px;height:36px;border-radius:10px;border:.5px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.new-cat .palette{display:flex;gap:4px;flex-wrap:wrap}
.empty-state{text-align:center;padding:2rem;color:var(--tx3);font-size:12px}
.total-row{font-weight:700;background:var(--bg2)}.total-row td{border-bottom:none!important;padding:10px 8px}
.txn-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--bd)}
.txn-item:last-child{border-bottom:none}
.fab{position:fixed;bottom:20px;right:20px;display:flex;gap:8px;z-index:50}
.fab button{height:44px;border-radius:22px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:transform .12s;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 16px;white-space:nowrap}
.fab button:active{transform:scale(.92)}
.fab .fab-g{background:var(--green);color:#fff}
.fab .fab-r{background:var(--red);color:#fff}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:.5px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom);display:none;justify-content:space-between}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--tx3);font-size:11px;padding:4px 0;cursor:pointer;font-family:inherit}
.tab-item .tab-icon{font-size:18px;line-height:1}
.tab-item .tab-label{font-size:9px}
.tab-item.act{color:var(--green)}
.tab-more-backdrop{position:fixed;inset:0;background:transparent;z-index:99;display:none}
.tab-more-menu{position:fixed;left:12px;right:12px;bottom:70px;background:var(--bg);border-radius:12px;border:.5px solid var(--bd);box-shadow:0 10px 30px rgba(0,0,0,.25);min-width:170px;z-index:101;display:none;padding:6px 0;max-height:60vh;overflow-y:auto}
.tab-more-item{padding:7px 14px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--tx)}
.tab-more-item span{font-size:18px}
.tab-more-item small{font-size:11px}
.tab-more-item:hover{background:var(--bg2)}
.toast{position:fixed;top:20px;right:20px;z-index:9999;border-radius:12px;padding:14px 20px;max-width:340px;font-size:13px;background:rgba(32,32,32,.97);color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.35);display:flex;align-items:flex-start;gap:10px;transform:translateX(120%);opacity:0;animation:toast-in .25s forwards}
.toast.warn{background:linear-gradient(135deg,#3b2f00,#2b2410);border:1px solid rgba(255,213,79,.5);color:#ffecb3}
.toast.danger{background:linear-gradient(135deg,#3b0000,#291010);border:1px solid rgba(244,67,54,.6);color:#ffcccb}
.toast.ok{background:linear-gradient(135deg,#0a2e1f,#0f3d28);border:1px solid rgba(29,158,117,.5);color:#a7f3d0}
.toast + .toast{margin-top:10px}
.toast-title{font-weight:600;margin-bottom:2px}
.toast-body{font-size:12px;opacity:.9}
@keyframes toast-in{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toast-out{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.fade-up{opacity:0;transform:translateY(8px);animation:fadeUp .45s forwards cubic-bezier(.16,1,.3,1)}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.chart-appear{opacity:0;transform:translateY(10px);animation:chartIn .55s .12s forwards cubic-bezier(.16,1,.3,1)}
@keyframes chartIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.txn-anim{opacity:0;transform:translateY(6px);animation:fadeUp .4s forwards cubic-bezier(.16,1,.3,1)}
.net-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.net-ring{width:34px;height:34px;border-radius:50%;border:2px solid transparent;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(from 0deg,var(--green),var(--blue)) border-box}
.net-ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg2)}
.net-ring.net-neg{background:conic-gradient(from 0deg,var(--red),#D85A30) border-box}
.net-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(29,158,117,.6);animation:pulseDot 1.4s infinite}
.net-neg .net-dot{background:var(--red);box-shadow:0 0 0 0 rgba(226,75,74,.6)}
@keyframes pulseDot{to{box-shadow:0 0 0 10px rgba(0,0,0,0)}}
/* Android vb. cihazlarda TL simgesi (₺) için font – Noto Sans U+20BA içerir */
.tl{font-family:'Noto Sans',Roboto,sans-serif;font-feature-settings:normal}
@media(max-width:640px){
.sg{grid-template-columns:repeat(2,1fr)}
.gr2{grid-template-columns:1fr}
.shell{padding:8px;padding-left:max(8px,env(safe-area-inset-left));padding-right:max(8px,env(safe-area-inset-right))}
.tbl{font-size:10px}
.topbar{padding:12px 14px;padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}
.content{padding:14px}
.nav{display:none}
body{padding-bottom:70px}
.fab{right:max(12px,env(safe-area-inset-right));bottom:calc(82px + env(safe-area-inset-bottom))}
.tabbar{display:flex;padding-left:max(10px,env(safe-area-inset-left));padding-right:max(10px,env(safe-area-inset-right))}
.toast{left:12px;right:12px;max-width:none}
.bx{min-width:0}
.trend-stats{grid-template-columns:1fr}
.cat-name{min-width:100%}
.cat-tools{width:100%;justify-content:flex-start}
}
</style>
</head>
<body>
<div class="shell" id="app"></div>
<div class="fab" id="fabBtns" style="display:none">
<button class="fab-r" onclick="openM('expense')" title="Gider ekle"><span style="font-size:16px">💸</span> Gider</button>
<button class="fab-g" onclick="openM('income')" title="Gelir ekle"><span style="font-size:16px">💰</span> Gelir</button>
</div>
<div class="tab-more-backdrop" id="tabMoreBackdrop"></div>
<div class="tab-more-menu" id="tabMoreMenu">
  <div class="tab-more-item" data-more-page="income"><span>💰</span><small>Gelir</small></div>
  <div class="tab-more-item" data-more-page="month"><span>📅</span><small>Aylık</small></div>
  <div class="tab-more-item" data-more-page="insights"><span>📊</span><small>Analiz</small></div>
  <div class="tab-more-item" data-more-page="networth"><span>💼</span><small>Net Değer</small></div>
  <div class="tab-more-item" data-more-page="settings"><span>⚙️</span><small>Ayarlar</small></div>
</div>
<div class="tabbar" id="tabBar"></div>

<script>
const PL=['#378ADD','#D4537E','#7F77DD','#1D9E75','#D85A30','#854F0B','#E24B4A','#EF9F27'];
const PBG=['#E6F1FB','#FBEAF0','#EEEDFE','#E1F5EE','#FAECE7','#FAEEDA','#FCEBEB','#FAEEDA'];
const MS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const DCATS=[
{key:'kira',name:'Kira / Aidat',icon:'🏠',color:'#7F77DD',bg:'#EEEDFE',budget:0},
{key:'market',name:'Market / Gıda',icon:'🛒',color:'#1D9E75',bg:'#E1F5EE',budget:0},
{key:'fatura',name:'Faturalar',icon:'📄',color:'#378ADD',bg:'#E6F1FB',budget:0},
{key:'ulasim',name:'Ulaşım / Yakıt',icon:'🚗',color:'#D85A30',bg:'#FAECE7',budget:0},
{key:'egitim',name:'Eğitim',icon:'📚',color:'#854F0B',bg:'#FAEEDA',budget:0},
{key:'saglik',name:'Sağlık',icon:'🏥',color:'#D4537E',bg:'#FBEAF0',budget:0},
{key:'giyim',name:'Giyim / Kişisel',icon:'👗',color:'#EF9F27',bg:'#FAEEDA',budget:0},
{key:'yemek',name:'Dışarıda yemek',icon:'🍽️',color:'#E24B4A',bg:'#FCEBEB',budget:0},
{key:'eglence',name:'Eğlence / Hobi',icon:'🎬',color:'#7F77DD',bg:'#EEEDFE',budget:0},
{key:'teknoloji',name:'Teknoloji / Abonelik',icon:'💻',color:'#1D9E75',bg:'#E1F5EE',budget:0},
{key:'kredi',name:'Kredi / Borç',icon:'💳',color:'#73726c',bg:'#F1EFE8',budget:0},
{key:'cocuk',name:'Çocuk giderleri',icon:'👶',color:'#D4537E',bg:'#FBEAF0',budget:0},
{key:'tasarruf',name:'Tasarruf / Yatırım',icon:'🥇',color:'#BA7517',bg:'#FAEEDA',budget:0},
{key:'diger',name:'Diğer',icon:'📦',color:'#B4B2A9',bg:'#F1EFE8',budget:0}
];

// Load from localStorage as fallback
function loadLocal(){try{const s=localStorage.getItem('aile_butce_v5');if(s)return JSON.parse(s)}catch(e){}return null}
const saved=loadLocal();

window.APP_STATE=saved?{
  ...saved,
  goals:saved.goals||[],
  recurring:saved.recurring||[],
  lastRecurring:saved.lastRecurring||null,
  netWorth:saved.netWorth||{assets:[],liabilities:[]},
  netWorthHistory:saved.netWorthHistory||[],
  page:'dashboard',
  month:new Date().getMonth(),
  filter:'all',
  modal:null,
  txFilter:{cat:'all',mem:'all',type:'all',search:'',minAmt:'',maxAmt:'',dateFrom:'',dateTo:''}
}:{
  setup:true,
  members:[{name:'',color:PL[0],bg:PBG[0]},{name:'',color:PL[1],bg:PBG[1]}],
  cats:DCATS.map(c=>({...c})),
  income:[],
  expenses:[],
  goals:[],
  recurring:[],
  lastRecurring:null,
  netWorth:{assets:[],liabilities:[]},
  netWorthHistory:[],
  page:'dashboard',
  month:new Date().getMonth(),
  year:new Date().getFullYear(),
  filter:'all',
  modal:null,
  txFilter:{cat:'all',mem:'all',type:'all',search:'',minAmt:'',maxAmt:'',dateFrom:'',dateTo:''}
};
const A=window.APP_STATE;
window.showToast=(msg,type='warn')=>{
const host=document.body;
const wrapId='toast-container';
let wrap=document.getElementById(wrapId);
if(!wrap){wrap=document.createElement('div');wrap.id=wrapId;wrap.style.position='fixed';wrap.style.top='20px';wrap.style.right='20px';wrap.style.left='auto';wrap.style.zIndex='9999';wrap.style.display='flex';wrap.style.flexDirection='column';host.appendChild(wrap);}
const el=document.createElement('div');
el.className='toast '+(type==='danger'?'danger':type==='ok'?'ok':'warn');
el.innerHTML=`<div class="toast-body">${msg}</div>`;
wrap.appendChild(el);
setTimeout(()=>{el.style.animation='toast-out .25s forwards';el.addEventListener('animationend',()=>{el.remove();if(wrap&&wrap.children.length===0)wrap.remove();},{once:true});},4000);
};

window.showUndoToast=(msg,undoFn)=>{const host=document.body;const wrapId='toast-container';let wrap=document.getElementById(wrapId);if(!wrap){wrap=document.createElement('div');wrap.id=wrapId;wrap.style.cssText='position:fixed;top:20px;right:20px;left:auto;z-index:9999;display:flex;flex-direction:column;gap:6px';host.appendChild(wrap);}const el=document.createElement('div');el.className='toast warn';let timer;el.innerHTML=`<div class="toast-body" style="display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%"><span>${msg}</span><button onclick="this.closest('.toast')._undo && this.closest('.toast')._undo()" style="background:rgba(255,213,79,.25);border:1px solid rgba(255,213,79,.4);color:#ffecb3;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Geri Al</button></div>`;el._undo=()=>{clearTimeout(timer);undoFn();el.style.animation='toast-out .2s forwards';el.addEventListener('animationend',()=>{el.remove();if(wrap&&wrap.children.length===0)wrap.remove();},{once:true});};wrap.appendChild(el);timer=setTimeout(()=>{el.style.animation='toast-out .25s forwards';el.addEventListener('animationend',()=>{el.remove();if(wrap&&wrap.children.length===0)wrap.remove();},{once:true});},5000);};
const fmt=n=>{if(!n&&n!==0)return'—';return Math.round(n).toLocaleString('tr-TR')+'<span class="tl" aria-hidden="true">₺</span>'};
const fmtDate=d=>{if(!d)return'';try{const[y,m,dd]=d.split('-');return`${dd}.${m}.${y}`}catch(e){return d}};
const todayStr=()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')};
const dateToMonth=d=>{if(!d)return A.month;try{return parseInt(d.split('-')[1],10)-1}catch(e){return A.month}};
const txYr=t=>t.date?parseInt(t.date.split('-')[0]):(t.year||A.year);
const fmtPlain=n=>{if(!n&&n!==0)return'—';return Math.round(n).toLocaleString('tr-TR')+' TL'};
const fmtTooltip=n=>{if(n==null||n===undefined||isNaN(n))return'—';return Math.round(n).toLocaleString('tr-TR')+'₺'};
const fmtK=n=>{if(!n&&n!==0)return'—';const a=Math.abs(n);if(a>=1e6)return(n<0?'-':'')+(a/1e6).toFixed(1)+'M';if(a>=1000)return(n<0?'-':'')+(a/1000).toFixed(a>=1e4?0:1)+'K';return Math.round(n)+''};
let CHART_TOOLTIP_STYLE={backgroundColor:'rgba(28,28,30,0.96)',titleColor:'#f5f5f5',bodyColor:'#e5e5e5',borderColor:'rgba(255,255,255,0.12)',borderWidth:1,cornerRadius:10,padding:12,boxPadding:6,titleFont:{size:12},bodyFont:{size:11},displayColors:true,intersect:false,mode:'index'};
if(typeof Chart!=='undefined'){Chart.defaults.plugins.tooltip={...Chart.defaults.plugins.tooltip,...CHART_TOOLTIP_STYLE};Chart.defaults.interaction={mode:'index',intersect:false};}
let CHS=[];function dc(){CHS.forEach(c=>c.destroy());CHS=[]}
function allM(){return[{id:'all',name:'Herkes',initials:'H',color:'#1D9E75',bg:'#E1F5EE'},...A.members.map((m,i)=>({id:'m'+i,name:m.name,initials:m.name.charAt(0).toUpperCase(),color:m.color,bg:m.bg}))]}
function gG(mi){return A.income.filter(x=>x.month===mi&&txYr(x)===A.year).reduce((a,x)=>a+x.amount,0)}
function gE(mi){return A.expenses.filter(x=>x.month===mi&&txYr(x)===A.year).reduce((a,x)=>a+x.amount,0)}
function cT(ck,mi){return A.expenses.filter(x=>x.cat===ck&&(mi===undefined||x.month===mi)&&txYr(x)===A.year).reduce((a,x)=>a+x.amount,0)}

function ensureRecurringApplied(){
const key=A.year+'-'+A.month;
if(!A.recurring||!A.recurring.length)return;
if(A.lastRecurring===key)return;
A.recurring.forEach(r=>{
  const amt=r.amount||0;
  if(amt<=0)return;
  if(r.type==='income'){
    const exists=A.income.some(x=>x.month===A.month&&txYr(x)===A.year&&x.member===r.member&&x.amount===amt&&x.desc===r.desc);
    if(!exists)A.income.push({member:r.member,desc:r.desc||'Gelir',amount:amt,month:A.month,year:A.year});
  }else if(r.type==='expense'){
    const exists=A.expenses.some(x=>x.month===A.month&&txYr(x)===A.year&&x.member===r.member&&x.amount===amt&&x.desc===r.desc&&x.cat===r.cat);
    if(!exists)A.expenses.push({cat:r.cat,desc:r.desc||'',member:r.member,amount:amt,month:A.month,year:A.year});
  }
});
A.lastRecurring=key;
}

function sync(){
if(window.syncToFirebase)window.syncToFirebase();
else{localStorage.setItem('aile_butce_v5',JSON.stringify({members:A.members,cats:A.cats,income:A.income,expenses:A.expenses,goals:A.goals,recurring:A.recurring,lastRecurring:A.lastRecurring,netWorth:A.netWorth,netWorthHistory:A.netWorthHistory||[],setup:A.setup,year:A.year}))}
}

function R(){
ensureRecurringApplied();
dc();sync();const a=document.getElementById('app');
document.getElementById('fabBtns').style.display=A.setup?'none':'flex';
if(A.setup){var tb=document.getElementById('tabBar');if(tb)tb.style.display='none';rSetup(a);}
else{
var tbc=document.getElementById('tabBar');
if(tbc){tbc.style.display='';tbc.innerHTML=tabBarHTML();}
if(A.page==='dashboard')rDash(a);
else if(A.page==='income')rIncome(a);
else if(A.page==='month')rMonth(a);
else if(A.page==='transactions')rTxns(a);
else if(A.page==='budget')rBudget(a);
else if(A.page==='insights')rInsights(a);
else if(A.page==='goals')rGoals(a);
else if(A.page==='networth')rNetworth(a);
else if(A.page==='settings')rSettings(a);
}
}
window.renderApp=R;
function getEffectiveTheme(){var t=document.documentElement.getAttribute('data-theme');if(t)return t;return window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
function toggleTheme(){var next=getEffectiveTheme()==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('theme',next);R();}
window.toggleTheme=toggleTheme;

function rSetup(a){
a.innerHTML=`<div class="setup-page"><h1>Aile <span>Bütçesi</span></h1><p class="sub">Aile üyelerinizi ekleyin ve başlayın</p>
<div class="setup-section"><h3>Aile üyeleri</h3>
${A.members.map((m,i)=>`<div class="mem-input-row">
<input type="text" placeholder="${i===0?'Örn: Murat':i===1?'Örn: Sıdıka':'İsim...'}" value="${m.name}" data-mi="${i}">
<div style="display:flex;gap:3px">${PL.map((c,ci)=>`<div class="col-dot ${m.color===c?'sel':''}" style="background:${c}" data-mi="${i}" data-ci="${ci}"></div>`).join('')}</div>
${A.members.length>1?`<button class="rm-btn" data-rm="${i}">×</button>`:''}
</div>`).join('')}
<button class="btn" style="margin-top:8px" id="addM">+ Üye ekle</button></div>
<button class="start-btn" id="goBtn">Başlayalım</button>
<p style="text-align:center;margin-top:16px;font-size:11px;color:var(--tx3)"><span id="sync-status-setup"></span></p></div>`;
document.querySelectorAll('input[data-mi]').forEach(el=>{el.oninput=()=>{A.members[+el.dataset.mi].name=el.value}});
document.querySelectorAll('.col-dot').forEach(el=>{el.onclick=()=>{A.members[+el.dataset.mi].color=PL[+el.dataset.ci];A.members[+el.dataset.mi].bg=PBG[+el.dataset.ci];R()}});
document.querySelectorAll('[data-rm]').forEach(el=>{el.onclick=()=>{A.members.splice(+el.dataset.rm,1);R()}});
document.getElementById('addM').onclick=()=>{const ci=A.members.length%PL.length;A.members.push({name:'',color:PL[ci],bg:PBG[ci]});R()};
document.getElementById('goBtn').onclick=()=>{A.members=A.members.filter(m=>m.name.trim());if(!A.members.length)A.members=[{name:'Ben',color:PL[0],bg:PBG[0]}];A.setup=false;R()};
}

function topbar(){
const ms=allM();
return`<div class="topbar"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<h1>Aile <span>Bütçesi</span></h1>
<div class="fav">${ms.filter(m=>m.id!=='all').map(m=>`<div class="av ${A.filter===m.id?'act':''}" style="background:${m.bg};color:${m.color}" data-mem="${m.id}" title="${m.name}">${m.initials}</div>`).join('')}</div>
<span class="sync-badge" id="sync-status">...</span>

function catMonthlySeries(catKey){

function statsForSeries(series){
  const avg=series.reduce((a,b)=>a+b,0)/12;
  let maxV=-Infinity,maxI=0;
  for(let i=0;i<series.length;i++){if(series[i]>maxV){maxV=series[i];maxI=i;}}
  let minV=Infinity,minI=-1;
  for(let i=0;i<series.length;i++){const v=series[i];if(v>0 && v<minV){minV=v;minI=i;}}
  return {avg:avg,max:{i:maxI,v:maxV},min:{i:minI,v:minI>=0?minV:0,has:minI>=0}};
}

window.downloadPDF=async()=>{
  try{
    if(!window.jspdf||!window.jspdf.jsPDF){alert('PDF kutuphanesi yuklenemedi.');return;}
    if(typeof window.showToast==='function')window.showToast('PDF hazırlanıyor...','warn');

    const jsPDF=window.jspdf.jsPDF;
    const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});

    function trClean(s){
      if(!s)return '';
      return String(s).replace(/ş/g,'s').replace(/Ş/g,'S').replace(/ı/g,'i').replace(/İ/g,'I').replace(/ü/g,'u').replace(/Ü/g,'U').replace(/ö/g,'o').replace(/Ö/g,'O').replace(/ç/g,'c').replace(/Ç/g,'C').replace(/ğ/g,'g').replace(/Ğ/g,'G').replace(/₺/g,'TL').replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u{2600}-\u{27BF}]/gu,'');
    }
    const c=trClean;

    const year=A.year||new Date().getFullYear();
    const pad=n=>String(n).padStart(2,'0');
    const now=new Date();
    const today=pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear();
    const monthsShort=['OCA','SUB','MAR','NIS','MAY','HAZ','TEM','AGU','EYL','EKI','KAS','ARA'];
    const money=v=>(Math.round(v||0)).toLocaleString('tr-TR')+' TL';
    const members=allM();
    const memName=id=>{const m=members.find(x=>x.id===id);return m?c(m.name):'—';};

    doc.setFont('helvetica','bold');
    doc.setFontSize(18);
    doc.text(c('Aile Butce Raporu - '+year),14,18);
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.text(c('Olusturulma tarihi: '+today),14,26);

    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.text(c('Aylik Ozet'),14,34);

    const monthlyRows=[];
    let sumG=0,sumE=0,sumK=0;
    for(let mi=0;mi<12;mi++){
      const g=A.income.filter(x=>x.month===mi).reduce((a,x)=>a+(x.amount||0),0);
      const e=A.expenses.filter(x=>x.month===mi).reduce((a,x)=>a+(x.amount||0),0);
      const k=g-e;sumG+=g;sumE+=e;sumK+=k;
      monthlyRows.push([monthsShort[mi],money(g),money(e),money(k)]);
    }
    monthlyRows.push(['TOPLAM',money(sumG),money(sumE),money(sumK)]);
    doc.autoTable({
      startY:37,
      head:[['Ay','Gelir','Gider','Kalan']],
      body:monthlyRows,
      theme:'grid',
      styles:{fontSize:9,cellPadding:2,font:'helvetica'},
      headStyles:{fillColor:[29,158,117],textColor:255,fontStyle:'bold'},
      didParseCell:function(data){if(data.row.index===monthlyRows.length-1)data.cell.styles.fontStyle='bold';}
    });
    let y=doc.lastAutoTable.finalY+8;

    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.text(c('Kategori Bazli Harcamalar'),14,y);
    const catTotals=A.cats.map(ct=>{
      const total=A.expenses.filter(x=>x.cat===ct.key).reduce((a,x)=>a+(x.amount||0),0);
      return{ct,total};
    }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
    const totalExp=catTotals.reduce((a,x)=>a+x.total,0)||1;
    const catRows=catTotals.map(x=>[c(x.ct.name||''),money(x.total),money(x.total/12),String(Math.round(x.total/totalExp*1000)/10)]);
    doc.autoTable({
      startY:y+3,
      head:[[c('Kategori'),c('Toplam'),c('Aylik Ort.'),c('Pay(%)')]],
      body:catRows.length?catRows:[['-','-','-','-']],
      theme:'grid',
      styles:{fontSize:9,cellPadding:2,font:'helvetica'},
      headStyles:{fillColor:[55,138,221],textColor:255,fontStyle:'bold'}
    });
    y=doc.lastAutoTable.finalY+8;

    if(y>240){doc.addPage();y=18;}
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.text(c('Gelir Kaynaklari'),14,y);
    const incRows=A.income.map(t=>[c(t.desc||'Gelir'),memName(t.member),monthsShort[t.month]||'',money(t.amount||0)]);
    doc.autoTable({
      startY:y+3,
      head:[[c('Aciklama'),c('Kisi'),'Ay','Tutar']],
      body:incRows.length?incRows:[['-','-','-','-']],
      theme:'grid',
      styles:{fontSize:9,cellPadding:2,font:'helvetica'},
      headStyles:{fillColor:[226,75,74],textColor:255,fontStyle:'bold'}
    });

    if(y>220){doc.addPage();y=18;}
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.text(c('Gider Detayi'),14,y);
    const expRows=A.expenses.filter(x=>txYr(x)===year).sort((a,b)=>{const da=a.date||'',db=b.date||'';return da.localeCompare(db);}).map(t=>{const cat=A.cats.find(ct=>ct.key===t.cat);const dt=t.date?pad(parseInt(t.date.split('-')[2]))+'.'+pad(parseInt(t.date.split('-')[1]))+'.'+t.date.split('-')[0]:(monthsShort[t.month]||'');return[dt,c(t.desc||''),c(cat?cat.name:t.cat||''),memName(t.member),money(t.amount||0)];});
    doc.autoTable({startY:y+3,head:[['Tarih',c('Aciklama'),c('Kategori'),c('Kisi'),'Tutar']],body:expRows.length?expRows:[['-','-','-','-','-']],theme:'grid',styles:{fontSize:8,cellPadding:2,font:'helvetica'},headStyles:{fillColor:[226,75,74],textColor:255,fontStyle:'bold'}});
    y=doc.lastAutoTable.finalY+8;

    const pageCount=doc.internal.getNumberOfPages();
    for(let p=1;p<=pageCount;p++){
      doc.setPage(p);doc.setFont('helvetica','normal');doc.setFontSize(9);
      const w=doc.internal.pageSize.getWidth();
      const h=doc.internal.pageSize.getHeight();
      doc.text('Sayfa '+p+' / '+pageCount,w-14,h-8,{align:'right'});
    }

    doc.save('aile-butce-rapor-'+year+'.pdf');
    if(typeof window.showToast==='function')window.showToast('✅ PDF indirildi!','ok');
  }catch(e){
    console.error('PDF hata:',e);
    if(typeof window.showToast==='function')window.showToast('PDF olusturulamadi, tekrar deneyin','danger');
  }
};

window.saveRecurring=function(idx){if(!Array.isArray(A.recurring))A.recurring=[];var raw=(document.getElementById('rAmt')&&document.getElementById('rAmt').value)||'';var amt=parseFloat(String(raw).replace(/,/g,'.'));if(!(amt>0))return;var type=(document.getElementById('rType')&&document.getElementById('rType').value)==='expense'?'expense':'income';var desc=((document.getElementById('rDesc')&&document.getElementById('rDesc').value)||'').trim();var member=(document.getElementById('rMem')&&document.getElementById('rMem').value)||'';var cat=(document.getElementById('rCat')&&document.getElementById('rCat').value)||'';var day=parseInt((document.getElementById('rDay')&&document.getElementById('rDay').value)||'0');var item={type:type,desc:desc,amount:amt,member:member};if(type==='expense')item.cat=cat;if(day>=1&&day<=31)item.dayOfMonth=day;if(typeof idx==='number'&&idx>=0&&A.recurring[idx])A.recurring[idx]=item;else A.recurring.push(item);A.modal=null;if(window.syncToFirebase)window.syncToFirebase();R();};
window.saveAsset=()=>{if(!A.netWorth)A.netWorth={assets:[],liabilities:[]};const name=(document.getElementById('nwName')?.value||'').trim();if(!name)return;const cat=document.getElementById('nwCat')?.value||'Diğer';const amt=parseFloat((document.getElementById('nwAmt')?.value||'').replace(/,/g,'.'))||0;const iconMap={'Banka':'🏦','Yatırım':'📈','Gayrimenkul':'🏡','Araç':'🚗','Nakit':'💵','Diğer':'💼'};A.netWorth.assets.push({name,category:cat,amount:amt,icon:iconMap[cat]||'💼'});A.modal=null;R();};
window.saveLiab=()=>{if(!A.netWorth)A.netWorth={assets:[],liabilities:[]};const name=(document.getElementById('nwName')?.value||'').trim();if(!name)return;const cat=document.getElementById('nwCat')?.value||'Diğer';const amt=parseFloat((document.getElementById('nwAmt')?.value||'').replace(/,/g,'.'))||0;const iconMap={'Konut kredisi':'🏠','Taşıt kredisi':'🚗','İhtiyaç kredisi':'💰','Kredi kartı':'💳','Diğer':'📋'};A.netWorth.liabilities.push({name,category:cat,amount:amt,icon:iconMap[cat]||'📋'});A.modal=null;R();};
window.delAsset=i=>{if(!A.netWorth)return;const saved=A.netWorth.assets.splice(i,1)[0];R();window.showUndoToast('Varlık silindi',()=>{A.netWorth.assets.splice(i,0,saved);R();});};
window.delLiab=i=>{if(!A.netWorth)return;const saved=A.netWorth.liabilities.splice(i,1)[0];R();window.showUndoToast('Borç silindi',()=>{A.netWorth.liabilities.splice(i,0,saved);R();});};
window.saveGoal=()=>{const name=(document.getElementById('gName')?.value||'').trim();if(!name)return;
const type=document.getElementById('gType')?.value||'diger';
const target=parseFloat((document.getElementById('gTarget')?.value||'').replace(/,/g,'.'))||0;
const current=parseFloat((document.getElementById('gCurrent')?.value||'').replace(/,/g,'.'))||0;
if(target<=0)return;
const meta={tatil:{icon:'🏖',color:'#E6F1FB'},acil:{icon:'🚨',color:'#FCEBEB'},egitim:{icon:'📚',color:'#FAEEDA'},ev:{icon:'🏡',color:'#E1F5EE'},diger:{icon:'🎯',color:'#EEEDFE'}};
const m=meta[type]||meta.diger;
A.goals.push({name,target,current,icon:m.icon,color:m.color,type});
A.modal=null;R();};
window.adjustGoal=(i,delta)=>{const g=A.goals[i];if(!g)return;g.current=Math.max(0,(g.current||0)+delta);R();};
window.delGoal=i=>{const saved=A.goals.splice(i,1)[0];R();window.showUndoToast('Hedef silindi',()=>{A.goals.splice(i,0,saved);R();});};
window.delRecurring=i=>{const saved=A.recurring.splice(i,1)[0];R();window.showUndoToast('Tekrarlayan silindi',()=>{A.recurring.splice(i,0,saved);R();});};
window.delI=i=>{const saved=A.income.splice(i,1)[0];R();window.showUndoToast('Gelir silindi',()=>{A.income.splice(i,0,saved);R();});};
window.copyTx=(t,i)=>{const arr=t==='income'?A.income:A.expenses;const orig=arr[i];if(!orig)return;const copy={...orig,date:todayStr(),month:new Date().getMonth(),year:new Date().getFullYear()};arr.push(copy);R();window.showToast('İşlem kopyalandı — tarih bugüne ayarlandı','ok');};
window.delTx=(t,i)=>{const arr=t==='income'?A.income:A.expenses;const saved=arr.splice(i,1)[0];R();window.showUndoToast((t==='income'?'Gelir':'Gider')+' silindi',()=>{arr.splice(i,0,saved);R();});};
window.setTF=(k,v)=>{A.txFilter[k]=v;R()};
window.setTFDirect=(k,v)=>{A.txFilter[k]=v;sync();};
window.liveSearch=v=>{A.txFilter.search=v;const tbody=document.querySelector('.tbl tbody');if(!tbody)return;const q=v.toLowerCase();let vis=0;tbody.querySelectorAll('tr:not(.total-row)').forEach(tr=>{const desc=(tr.cells[1]?.textContent||'').toLowerCase();const cat=(tr.cells[2]?.textContent||'').toLowerCase();const show=!q||desc.includes(q)||cat.includes(q);tr.style.display=show?'':'none';if(show)vis++;});const hdr=document.querySelector('.content>div:first-child div');if(hdr){const total=A.income.length+A.expenses.length;hdr.innerHTML=`Tüm işlemler <span style="font-size:11px;color:var(--tx3);font-weight:400">${vis}/${total} kayıt</span>`;}};
window.toggleAdv=()=>{A.txAdvOpen=!A.txAdvOpen;const p=document.getElementById('advPanel');const b=document.getElementById('advToggle');if(p)p.classList.toggle('open',A.txAdvOpen);if(b)b.classList.toggle('act',A.txAdvOpen||[A.txFilter.minAmt,A.txFilter.maxAmt,A.txFilter.dateFrom,A.txFilter.dateTo].some(v=>v!==''));};
window.clearAdvFilters=()=>{A.txFilter.search='';A.txFilter.minAmt='';A.txFilter.maxAmt='';A.txFilter.dateFrom='';A.txFilter.dateTo='';R();};
const highlight=(text,q)=>{if(!q||!text)return text||'';const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return text.replace(re,'<mark style="background:rgba(29,158,117,.25);border-radius:2px;padding:0 1px">$1</mark>');};
window.saveEditInc=idx=>{const t=A.income[idx];if(!t)return;const amt=parseFloat((document.getElementById('mAmt')?.value||'').replace(/,/g,'.'))||0;if(amt<=0)return;const date=document.getElementById('mDate')?.value||t.date||todayStr();t.member=document.getElementById('mMem').value;t.desc=document.getElementById('mDesc').value||'Gelir';t.amount=amt;t.date=date;t.month=dateToMonth(date);t.year=parseInt(date.split('-')[0]);t.notes=document.getElementById('mNotes')?.value||'';A.modal=null;R();};
window.saveEditExp=idx=>{const t=A.expenses[idx];if(!t)return;const amt=parseFloat((document.getElementById('mAmt')?.value||'').replace(/,/g,'.'))||0;if(amt<=0)return;const date=document.getElementById('mDate')?.value||t.date||todayStr();t.cat=document.getElementById('mCat').value;t.desc=document.getElementById('mDesc').value||'';t.member=document.getElementById('mMem').value;t.amount=amt;t.date=date;t.month=dateToMonth(date);t.year=parseInt(date.split('-')[0]);t.notes=document.getElementById('mNotes')?.value||'';A.modal=null;R();};
window.saveGoalContrib=idx=>{const g=A.goals[idx];if(!g)return;const amt=parseFloat((document.getElementById('gcAmt')?.value||'').replace(/,/g,'.'))||0;if(amt<=0)return;const dir=parseInt(document.getElementById('gcDir').value)||1;g.current=Math.max(0,(g.current||0)+dir*amt);A.modal=null;R();};

R();
</script>
